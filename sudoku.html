<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數獨 Sudoku</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>數獨 Sudoku</h1>
        <div class="timer" id="timer">00:00</div>
    </header>

    <div class="difficulty-selector">
        <button class="difficulty-btn" data-level="easy">簡單</button>
        <button class="difficulty-btn active" data-level="medium">中等</button>
        <button class="difficulty-btn" data-level="hard">困難</button>
    </div>

    <div class="board-container">
        <div class="board" id="board"></div>
    </div>

    <div class="number-pad" id="numberPad">
        <button class="number-btn" data-num="1">1</button>
        <button class="number-btn" data-num="2">2</button>
        <button class="number-btn" data-num="3">3</button>
        <button class="number-btn" data-num="4">4</button>
        <button class="number-btn" data-num="5">5</button>
        <button class="number-btn" data-num="6">6</button>
        <button class="number-btn" data-num="7">7</button>
        <button class="number-btn" data-num="8">8</button>
        <button class="number-btn" data-num="9">9</button>
        <button class="number-btn" data-num="0">⌫</button>
    </div>

    <div class="controls">
        <button class="control-btn" id="themeBtn">主題</button>
        <button class="control-btn" id="historyBtn">歷史</button>
        <button class="control-btn" id="undoBtn">撤回</button>
        <button class="control-btn" id="hintBtn">提示</button>
        <button class="control-btn" id="candidatesBtn">候選數</button>
        <button class="control-btn" id="resetBtn">重置</button>
        <button class="control-btn primary" id="newGameBtn">新遊戲</button>
    </div>

    <div id="statusMessage" style="margin-top: 15px; color: #ff6b6b; height: 24px; font-weight: 500;"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>🎉 恭喜通關！</h2>
            <p>完成時間：<span id="finalTime">00:00</span></p>
            <button class="btn" id="playAgainBtn">再玩一局</button>
        </div>
    </div>

    <div class="modal-overlay" id="historyModal">
        <div class="modal">
            <h2>📊 遊戲歷史</h2>
            <div id="historyList" class="history-list"></div>
            <button class="btn" id="closeHistoryBtn">關閉</button>
        </div>
    </div>

    <div class="modal-overlay" id="loadGameModal">
        <div class="modal">
            <h2>💾 發現存檔</h2>
            <p>是否要繼續上次的遊戲？</p>
            <div class="modal-buttons">
                <button class="btn" id="loadGameBtn">繼續遊戲</button>
                <button class="btn secondary" id="newGameAnywayBtn">新遊戲</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
